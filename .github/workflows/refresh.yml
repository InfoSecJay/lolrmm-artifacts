name: Daily LOLRMM refresh

# Runs once a day and on manual dispatch. Regenerates the full export set
# under `data/` from upstream LOLRMM and commits the diff if anything changed.
# Fails the job if upstream files are missing or any YAML fails to parse.
on:
  schedule:
    - cron: "17 6 * * *"  # 06:17 UTC daily — off-the-hour to avoid scheduler spikes.
  workflow_dispatch: {}

# Needed for the bot commit step below.
permissions:
  contents: write

concurrency:
  group: refresh-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Refresh exports
        env:
          # Lifts anonymous API rate limits for the Contents-API fallback path.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          lolrmm refresh --out data/ --strict

      - name: Summarise changes
        id: summary
        run: |
          git add -N data/
          if git diff --quiet -- data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat -- data/ | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit refreshed data
        if: steps.summary.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore(data): daily LOLRMM refresh ($(date -u +%Y-%m-%d))"
          git push

      - name: Upload exports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lolrmm-data
          path: data/
          retention-days: 30
